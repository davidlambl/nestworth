appId: com.nestworth.app
---
- launchApp:
    clearState: true

- runFlow: ../login.yaml

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- assertVisible: "Accounts"

# Purge any Maestro-prefixed accounts left over from prior runs
- runFlow: ../cleanup-test-accounts.yaml

# Create a scratch account
- tapOn:
    id: "accounts-add-btn"
- tapOn:
    id: "accounts-new-name"
- inputText: "Maestro Rule Acct"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "accounts-create-btn"
- extendedWaitUntil:
    visible: ".*Maestro Rule Acct.*"
    timeout: 10000

# Navigate to Settings > Recurring Transactions
- tapOn:
    id: "tab-settings"
- tapOn: ".*Recurring Transactions.*"

# Create a new rule
- tapOn:
    id: "recurring-add-btn"
- tapOn: ".*Maestro Rule Acct.*"
- tapOn:
    id: "recurring-payee"
- inputText: "Maestro Rent"
- tapOn:
    id: "recurring-amount"
- inputText: "1200"
- pressKey: Enter
- tapOn: "Monthly"
- tapOn:
    id: "recurring-save"

- assertVisible: ".*Maestro Rent.*"

# Long-press to delete the rule
- longPressOn: ".*Maestro Rent.*"
- tapOn: "Delete"

# Go back and clean up the account
- tapOn: "Settings"
- tapOn:
    id: "tab-accounts"
- tapOn:
    id: "accounts-edit-toggle"
- tapOn:
    id: "accounts-delete-Maestro Rule Acct"
- tapOn: "Delete"
