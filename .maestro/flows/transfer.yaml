appId: com.nestworth.app
---
- launchApp:
    clearState: true

- runFlow: ../login.yaml

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- assertVisible: "Accounts"

# Purge any Maestro-prefixed accounts left over from prior runs
- runFlow: ../cleanup-test-accounts.yaml

# Create two accounts
- tapOn:
    id: "accounts-add-btn"
- tapOn:
    id: "accounts-new-name"
- inputText: "Maestro From"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "accounts-create-btn"
# Assert against the card's testID — a `.*Maestro From.*` text regex would
# false-positive on the "Maestro From" text still visible in the new-account
# modal's name field, letting the next tapOn race into a still-open modal.
- extendedWaitUntil:
    visible:
      id: "account-card-maestro-from"
    timeout: 10000

- tapOn:
    id: "accounts-add-btn"
- tapOn:
    id: "accounts-new-name"
- inputText: "Maestro To"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "accounts-create-btn"
- extendedWaitUntil:
    visible:
      id: "account-card-maestro-to"
    timeout: 10000

# Open "from" account and start transfer
- tapOn: ".*Maestro From.*"
- tapOn:
    id: "register-transfer-btn"

# Pick "to" account
- tapOn:
    id: "transfer-to-picker"
- tapOn: ".*Maestro To.*"

- tapOn:
    id: "transfer-amount"
- inputText: "10000"
- pressKey: Enter
- tapOn:
    id: "transfer-save"

- assertVisible: ".*Transfer to Maestro To.*"

# Clean up
- tapOn: "Accounts"
- tapOn:
    id: "accounts-edit-toggle"
- tapOn:
    id: "accounts-delete-Maestro From"
- tapOn: "Delete"
- tapOn:
    id: "accounts-delete-Maestro To"
- tapOn: "Delete"
