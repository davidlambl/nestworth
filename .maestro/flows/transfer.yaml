appId: com.nestworth.app
---
- launchApp:
    clearState: true

- runFlow: ../login.yaml

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- assertVisible: "Accounts"

# Create two accounts
- tapOn:
    id: "accounts-add-btn"
- tapOn:
    id: "accounts-new-name"
- inputText: "Maestro From"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "accounts-create-btn"
- extendedWaitUntil:
    visible: ".*Maestro From.*"
    timeout: 10000

- tapOn:
    id: "accounts-add-btn"
- tapOn:
    id: "accounts-new-name"
- inputText: "Maestro To"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "accounts-create-btn"
- extendedWaitUntil:
    visible: ".*Maestro To.*"
    timeout: 10000

# Open "from" account and start transfer
- tapOn: ".*Maestro From.*"
- tapOn:
    id: "register-transfer-btn"

# Pick "to" account
- tapOn:
    id: "transfer-to-picker"
- tapOn: ".*Maestro To.*"

- tapOn:
    id: "transfer-amount"
- inputText: "10000"
- pressKey: Enter
- tapOn:
    id: "transfer-save"

- assertVisible: ".*Transfer to Maestro To.*"

# Clean up
- tapOn: "Accounts"
- tapOn:
    id: "accounts-edit-toggle"
- tapOn:
    id: "accounts-delete-Maestro From"
- tapOn: "Delete"
- tapOn:
    id: "accounts-delete-Maestro To"
- tapOn: "Delete"
